# Azure Developer CLI (azd) template for SRE Agent Lab
# Run: azd up
name: sre-agent-lab
metadata:
  template: sre-agent-lab@1.0.0

infra:
  provider: bicep
  path: infra

services:
  grubify-api:
    project: ./src/grubify/GrubifyApi
    language: dotnet
    host: containerapp
    docker:
      path: ./src/grubify/GrubifyApi/Dockerfile
      context: ./src/grubify/GrubifyApi

hooks:
  postprovision:
    shell: sh
    run: ./scripts/post-provision.sh
